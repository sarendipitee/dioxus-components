name: Add Components

on:
  push:
    branches:
      - main
    paths:
      - /**
      - preview/**/*.rs
      - preview/**/Cargo.toml
      - primitives/**/*.rs
      - primitives/**/Cargo.toml
      - .github/**
      - Cargo.toml

  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - /**
      - preview/**/*.rs
      - preview/**/Cargo.toml
      - primitives/**/*.rs
      - primitives/**/Cargo.toml
      - .github/**
      - Cargo.toml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  add-all-components:
    if: github.event.pull_request.draft == false
    name: Add All Components
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          version: 1.0
      - uses: DioxusLabs/dioxus-ci/actions/setup-dioxus@v0.1.0
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
          cache-on-failure: "false"
      - uses: DioxusLabs/dioxus-ci/actions/install-dioxus-cli@v0.1.0
        with:
          version: 0.7.9
      - name: Add components and check
        run: |
          cd test-harness
          # Add dependencies manually; TODO: remove this once dx components supports local dependencies
          dx components add calendar,popover --path ..
          dx components add button,separator,sheet,skeleton,tooltip --path ..
          dx components add dialog,input --path ..
          # Add all components
          dx components add --all --path .. --force
          # Switch to the local versions of dioxus-primitives and dioxus-components
          cargo add dioxus-primitives --path ../primitives
          cargo add dioxus-components --path ../dioxus-components
          # Make sure it still builds
          cargo check --all-features
  add-each-component:
    if: github.event.pull_request.draft == false
    name: Add Each Components
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
          version: 1.0
      - uses: DioxusLabs/dioxus-ci/actions/setup-dioxus@v0.1.0
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
          cache-on-failure: "false"
      - uses: DioxusLabs/dioxus-ci/actions/install-dioxus-cli@v0.1.0
        with:
          version: 0.7.9
      - name: Add each component and check
        run: |
          cd preview/src/components/
          for file in *; do
            if [ -d "$file" ]; then
              echo "Testing component: $file"
            else
              continue
            fi
            # Go to test harness
            cd ../../../test-harness
            # Add dependencies manually; TODO: remove this once dx components supports local dependencies
            if [ "$file" = "date_picker" ]; then
              dx components add calendar,popover --path ..
            elif [ "$file" = "sidebar" ]; then
              dx components add button,separator,sheet,skeleton,tooltip --path ..
            elif [ "$file" = "item" ]; then
              dx components add separator --path ..
            elif [ "$file" = "color_picker" ]; then
              dx components add popover,input --path ..
            fi
            # Add the component
            dx components add "$file" --path ..
            # Switch to the local versions of dioxus-primitives and dioxus-components
            cargo add dioxus-primitives --path ../primitives
            cargo add dioxus-components --path ../dioxus-components
            # Make sure it still builds
            cargo check --all-features
            # Undo changes
            dx components remove --all --path ..
            cd ../preview/src/components/
          done
